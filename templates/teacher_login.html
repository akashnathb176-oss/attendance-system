<!DOCTYPE html>
<html>
<head>
    <title>Teacher Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; }
        h2 { color: #818cf8; margin-bottom: 8px; font-size: 24px; }
        p { color: #666; font-size: 13px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px 15px; margin-bottom: 15px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; color: white; font-size: 14px; }
        input:focus { outline: none; border-color: #6366f1; }
        button { width: 100%; padding: 13px; background: #6366f1; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: 600; }
        button:hover { background: #4f46e5; }
        .bottom { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        .bottom a { color: #818cf8; text-decoration: none; }
        .forgot { text-align: center; margin-top: 12px; }
        .forgot a { color: #666; font-size: 13px; text-decoration: none; }
        .forgot a:hover { color: #818cf8; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; }
        .back { display: block; text-align: center; margin-bottom: 20px; color: #666; font-size: 13px; text-decoration: none; }
        .back:hover { color: #818cf8; }
    </style>
</head>
<body>
    <div class="box">
        <a href="/" class="back">← Back to home</a>
        <h2>👩‍🏫 Teacher Login</h2>
        <p>Welcome back!</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="bottom">No account? <a href="/teacher/register">Register here</a></div>
        <div class="forgot"><a href="/teacher/forgot">Forgot Password?</a></div>
    </div>
</body>
</html>
